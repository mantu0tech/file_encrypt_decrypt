upstream flask_app {
    server my-app:5000;   # your Flask container name and port
}

server {
    listen 80;

    # Enable stub_status — this is what nginx-exporter scrapes
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.0.0.0/8;   # allow Docker internal network
        deny all;
    }

    # Forward all traffic to Flask
    location / {
        proxy_pass         http://flask_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Log response time for latency tracking
        proxy_connect_timeout  60s;
        proxy_read_timeout     60s;
    }

    # Access log format with timing
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
